<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFG P&L Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #334155; padding: 24px 32px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #f8fafc; }
  .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
  .summary-row { display: flex; gap: 16px; padding: 24px 32px; flex-wrap: wrap; }
  .summary-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 18px 22px; flex: 1; min-width: 180px; }
  .summary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 6px; }
  .summary-card .value { font-size: 22px; font-weight: 700; }
  .summary-card .subtext { font-size: 11px; color: #64748b; margin-top: 4px; }
  .green { color: #4ade80; }
  .red { color: #f87171; }
  .blue { color: #60a5fa; }
  .amber { color: #fbbf24; }
  .tabs { display: flex; gap: 0; padding: 0 32px; border-bottom: 1px solid #334155; }
  .tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab:hover { color: #e2e8f0; }
  .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
  .content { padding: 24px 32px; }
  .category-grid { display: flex; flex-direction: column; gap: 8px; }
  .category-row { background: #1e293b; border: 1px solid #334155; border-radius: 8px; overflow: hidden; transition: all 0.15s; }
  .category-row:hover { border-color: #475569; }
  .category-header { display: grid; grid-template-columns: 2fr repeat(3, 1fr) 80px 150px; align-items: center; padding: 14px 20px; cursor: pointer; user-select: none; }
  .category-header:hover { background: #1e3a5f22; }
  .cat-name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .cat-name .arrow { font-size: 10px; color: #64748b; transition: transform 0.2s; display: inline-block; }
  .cat-name .arrow.open { transform: rotate(90deg); }
  .cat-amount { text-align: right; font-size: 14px; font-variant-numeric: tabular-nums; }
  .cat-bar-col { text-align: right; }
  .bar-container { display: inline-block; width: 60px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; vertical-align: middle; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .line-items { display: none; border-top: 1px solid #334155; }
  .line-items.open { display: block; }
  .line-item { display: grid; grid-template-columns: 2fr repeat(3, 1fr) 80px 150px; padding: 10px 20px 10px 44px; font-size: 13px; border-top: 1px solid #1e293b; align-items: start; }
  .line-item:hover { background: #1e293b99; }
  .line-item:nth-child(odd) { background: #0f172a44; }
  .li-name { color: #cbd5e1; }
  .li-amount { text-align: right; font-variant-numeric: tabular-nums; color: #94a3b8; }
  .li-amount.has-value { color: #e2e8f0; }
  .col-header { display: grid; grid-template-columns: 2fr repeat(3, 1fr) 80px 150px; padding: 8px 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; border-bottom: 1px solid #334155; margin-bottom: 4px; }
  .note-input { width: 100%; height: 32px; background: #0f172a; border: 1px solid #334155; border-radius: 4px; color: #e2e8f0; font-size: 11px; padding: 4px 6px; resize: vertical; max-height: 80px; font-family: inherit; }
  .note-input:focus { outline: none; border-color: #60a5fa; }
  .note-input::placeholder { color: #475569; }
  .col-header span { text-align: right; }
  .col-header span:first-child { text-align: left; }
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; margin-top: 8px; color: #f8fafc; }
  .chart-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .chart-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; flex: 1; min-width: 300px; }
  .chart-card h3 { font-size: 13px; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.03em; }
  .horiz-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .horiz-bar .bar-label { font-size: 12px; width: 100px; text-align: right; color: #94a3b8; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .horiz-bar .bar-track { flex: 1; height: 18px; background: #334155; border-radius: 4px; overflow: hidden; position: relative; }
  .horiz-bar .bar-inner { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 10px; color: #fff; font-weight: 600; min-width: fit-content; }
  .yr-legend { display: flex; gap: 16px; margin-bottom: 16px; }
  .yr-legend span { font-size: 11px; display: flex; align-items: center; gap: 4px; color: #94a3b8; }
  .yr-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-2023 { background: #60a5fa; }
  .dot-2024 { background: #a78bfa; }
  .dot-2025 { background: #4ade80; }
  .pct-change { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
  .pct-up { background: #166534; color: #4ade80; }
  .pct-down { background: #7f1d1d; color: #f87171; }
  .pct-flat { background: #334155; color: #94a3b8; }
  @media (max-width: 768px) {
    .summary-row { padding: 16px; }
    .content { padding: 16px; }
    .category-header { grid-template-columns: 1.5fr repeat(3, 1fr) 60px 100px; padding: 12px 12px; font-size: 12px; }
    .line-item { grid-template-columns: 1.5fr repeat(3, 1fr) 60px 100px; padding-left: 24px; }
    .col-header { grid-template-columns: 1.5fr repeat(3, 1fr) 60px 100px; }
  }
</style>

// ── HELPERS ──
function fmt(n) {
  if (n === 0) return '—';
  const neg = n < 0;
  const s = '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return neg ? '(' + s + ')' : s;
}

function catTotal(cat, yi) {
  return Object.values(cat.items).reduce((s, v) => s + (v[yi] || 0), 0);
}

function sectionTotal(section, yi) {
  return Object.values(section).reduce((s, cat) => s + catTotal(cat, yi), 0);
}

function pctBadge(prev, curr) {
  if (prev === 0 && curr === 0) return '<span class="pct-change pct-flat">—</span>';
  if (prev === 0) return '<span class="pct-change pct-up">NEW</span>';
  const pct = ((curr - prev) / Math.abs(prev)) * 100;
  const cls = pct > 1 ? 'pct-up' : pct < -1 ? 'pct-down' : 'pct-flat';
  const sign = pct > 0 ? '+' : '';
  return `<span class="pct-change ${cls}">${sign}${pct.toFixed(0)}%</span>`;
}

// ── SUMMARY ──
function renderSummary() {
  const ti = YEARS.map((_, i) => sectionTotal(data.income, i));
  const te = YEARS.map((_, i) => sectionTotal(data.expenses, i));
  const oi = YEARS.map((_, i) => {
    const inc = catTotal(data.other["Other Income"], i);
    const exp = catTotal(data.other["Other Expenses"], i);
    return inc - exp;
  });
  const ni = YEARS.map((_, i) => ti[i] - te[i] + oi[i]);

  const cards = [
    { label: 'Total Revenue (2025)', value: fmt(ti[2]), cls: 'green', sub: `2024: ${fmt(ti[1])} &middot; 2023: ${fmt(ti[0])}` },
    { label: 'Total Expenses (2025)', value: fmt(te[2]), cls: 'red', sub: `2024: ${fmt(te[1])} &middot; 2023: ${fmt(te[0])}` },
    { label: 'Net Operating Income (2025)', value: fmt(ti[2] - te[2]), cls: ti[2]-te[2] >= 0 ? 'green' : 'red', sub: `2024: ${fmt(ti[1]-te[1])} &middot; 2023: ${fmt(ti[0]-te[0])}` },
    { label: 'Net Income (2025)', value: fmt(ni[2]), cls: ni[2] >= 0 ? 'green' : 'red', sub: `2024: ${fmt(ni[1])} &middot; 2023: ${fmt(ni[0])}` },
  ];
  document.getElementById('summaryRow').innerHTML = cards.map(c =>
    `<div class="summary-card"><div class="label">${c.label}</div><div class="value ${c.cls}">${c.value}</div><div class="subtext">${c.sub}</div></div>`
  ).join('');
}

// ── CATEGORY TABLE ──
function renderSection(section, isExpense) {
  const maxVal = Math.max(...Object.values(section).flatMap(cat => YEARS.map((_, i) => Math.abs(catTotal(cat, i)))));
  let html = `<div class="col-header"><span>Category</span><span>2023</span><span>2024</span><span>2025</span><span>Trend</span><span>Notes</span></div>`;
  html += '<div class="category-grid">';

  // Sort categories by 2025 value descending
  const sorted = Object.entries(section).sort((a, b) => Math.abs(catTotal(b[1], 2)) - Math.abs(catTotal(a[1], 2)));

  for (const [name, cat] of sorted) {
    const totals = YEARS.map((_, i) => catTotal(cat, i));
    const id = name.replace(/[^a-zA-Z0-9]/g, '_');
    const barPct = maxVal > 0 ? (Math.abs(totals[2]) / maxVal * 100) : 0;
    const barColor = isExpense ? '#f87171' : '#4ade80';

    html += `<div class="category-row">`;
    html += `<div class="category-header" onclick="toggleItems('${id}')">`;
    html += `<div class="cat-name"><span class="arrow" id="arrow_${id}">&#9654;</span>${name}</div>`;
    html += totals.map(t => `<div class="cat-amount">${fmt(t)}</div>`).join('');
    html += `<div class="cat-bar-col">${pctBadge(totals[1], totals[2])}</div>`;
    html += `<div></div>`;
    html += `</div>`;

    html += `<div class="line-items" id="items_${id}">`;
    const itemsSorted = Object.entries(cat.items).sort((a, b) => Math.abs(b[1][2]) - Math.abs(a[1][2]));
    for (const [iname, vals] of itemsSorted) {
      const noteKey = `note_${name}_${iname}`.replace(/[^a-zA-Z0-9]/g, '_');
      const savedNote = localStorage.getItem(noteKey) || '';
      html += `<div class="line-item">`;
      html += `<div class="li-name">${iname}</div>`;
      html += vals.map(v => `<div class="li-amount ${v !== 0 ? 'has-value' : ''}">${fmt(v)}</div>`).join('');
      html += `<div class="li-amount">${pctBadge(vals[1], vals[2])}</div>`;
      html += `<div><textarea class="note-input" maxlength="300" placeholder="Add note..." data-key="${noteKey}" onclick="event.stopPropagation()">${savedNote}</textarea></div>`;
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';

  // Section total row
  const secTotals = YEARS.map((_, i) => sectionTotal(section, i));
  html += `<div style="display:grid;grid-template-columns:2fr repeat(3,1fr) 80px 150px;padding:14px 20px;font-weight:700;font-size:14px;border-top:2px solid #475569;margin-top:8px;">`;
  html += `<div>Total</div>`;
  html += secTotals.map(t => `<div style="text-align:right">${fmt(t)}</div>`).join('');
  html += `<div style="text-align:right">${pctBadge(secTotals[1], secTotals[2])}</div>`;
  html += `<div></div>`;
  html += `</div>`;

  return html;
}

function toggleItems(id) {
  const el = document.getElementById('items_' + id);
  const arrow = document.getElementById('arrow_' + id);
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ── TABS ──
let activeTab = 'income';

function renderTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const cont = document.getElementById('mainContent');

  if (tab === 'income') {
    cont.innerHTML = `<div class="section-title">Revenue by Category</div>` + renderSection(data.income, false);
  } else if (tab === 'expenses') {
    cont.innerHTML = `<div class="section-title">Expenses by Category</div>` + renderSection(data.expenses, true);
  } else {
    cont.innerHTML = `<div class="section-title">Other Income & Expenses</div>` + renderSection(data.other, false);
  }
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => renderTab(t.dataset.tab)));

// ── NOTES PERSISTENCE ──
document.addEventListener('input', function(e) {
  if (e.target.classList.contains('note-input')) {
    localStorage.setItem(e.target.dataset.key, e.target.value);
  }
});

// ── INIT ──
renderSummary();
renderTab('income');
</script>
